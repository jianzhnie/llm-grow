# ============================================================
# Kimi-K2-Base  →  ~2T  (2x 参数量)
# 方法：Expert Upcycling（专家数扩增）
# 结果：384 experts → 768 experts，~1T → ~2T，~2.0x
#
# 架构特点（DeepSeek-V3 变体）：
#   - 61 层：第 0 层为 Dense（无专家），第 1-60 层为 MoE
#   - MLA 注意力（kv_lora_rank=512，q_lora_rank=1536）
#   - fp8 量化（每个权重张量附带 weight_scale_inv）
#   - 共享专家：每 MoE 层 1 个 shared_expert + 384 个路由专家
#   - n_shared_experts=1（不参与路由，所有 token 都激活）
#
# FP8 处理：
#   - 扩增时 weight_scale_inv 与对应 weight 同步复制
#   - 训练时需使用 fp8 训练框架（TransformerEngine / Nanotron）
#
# 关键 identity block 细节：
#   - Layer 0 (dense)  : 零化 mlp.down_proj.weight + self_attn.o_proj.weight
#   - Layer 1-60 (MoE) : 零化 384 个 mlp.experts.{i}.down_proj.weight
#                       + mlp.shared_experts.down_proj.weight
#                       + self_attn.o_proj.weight
#   → auto_expand 自动通过 ModelProfile.dense_only_layers=[0] 处理
# ============================================================

model:
  src_dir: /Users/robin/hfhub/models/moonshotai/Kimi-K2-Base
  family: deepseek_moe
  architecture: DeepseekV3ForCausalLM
  original_params: ~1T
  original_layers: 61             # 1 dense + 60 MoE
  original_experts_per_layer: 384 # 路由专家（不含 1 个共享专家）
  original_topk: 8
  has_fp8: true
  has_mla_attn: true
  dense_only_layers: [0]          # 第 0 层无专家

expansion:
  method: expert
  algorithm: generic_moe_upcycling

  # 专家扩增参数
  expand_factor: 2                # 384 → 768 路由专家
  noise_scale: 1.0e-6

  # FP8 说明：weight_scale_inv 张量随对应 weight 同步复制
  # 训练时需 fp8 感知框架重新计算 scale

  # 同步更新配置
  config_patches:
    n_routed_experts: 768         # 384 × 2
    num_experts_per_tok: 16       # 8 × 2
    # n_shared_experts 保持不变（=1，所有 token 都激活共享专家）

  # 参数量预估
  target_params: ~2T
  target_ratio: ~2.0x
  note: "fp8 存储约为 bf16 一半，实际显存需求约 1TB fp8"

output:
  dir: ./outputs/kimi_k2_base_2x
  target_shard_gb: 2.0            # 建议较小分片，单层专家张量约 1.3GB
  # 预计输出 ~120 个分片（~240GB fp8 权重）

# ── Continued Pre-training ────────────────────────────────────────────────
training:
  freeze_original: false

  phase1:
    description: "全参数 CPT，专家分化（fp8 混合精度训练）"
    max_tokens: 50_000_000_000    # 50B tokens（超大模型需更多步骤分化专家）
    learning_rate: 1.0e-5         # 超大模型学习率更保守
    lr_scheduler: cosine_with_warmup
    warmup_steps: 3000
    per_device_batch_size: 1
    gradient_accumulation_steps: 32
    save_steps: 500

    # MoE 负载均衡
    moe_loss:
      load_balance_coeff: 1.0e-3  # Kimi-K2 原生 aux_loss_alpha=0.001
      seq_aux: true               # 使用 sequence-level auxiliary loss（与原配置一致）

    # fp8 训练配置
    fp8_training:
      enabled: true
      framework: transformer_engine  # 或 nanotron / deepspeed fp8
      activation_scheme: dynamic    # 与原模型一致

  # 超大模型无需 phase2（训练成本过高）

data:
  pretrain_data_path: null
  pretrain_ratio: 0.93
  instruction_ratio: 0.04
  replay_ratio: 0.03

  # 超大模型建议数据策略
  # - 以 Web 为主（60%），代码（20%），数学（10%），科学/书籍（10%）
  # - 确保数据多样性以帮助专家分化
  sequence_length: 4096           # 建议初期用较短序列，节省计算

eval:
  benchmarks: [mmlu, cmmlu, gsm8k, math, humaneval, mbpp, arc_challenge]
  eval_every_n_tokens: 10_000_000_000  # 每 10B tokens（超大模型评估耗时）
  monitor:
    expert_load_balance: true
    fp8_overflow_check: true      # 监控 fp8 溢出率

# ── 可选：深度扩增方案 ────────────────────────────────────────────────────
# expansion_alternative:
#   method: depth
#   algorithm: generic_moe_depth
#   num_new_layers: 4             # 61 + 4 = 65 层
#   note: |
#     每个 identity 层需零化 384 expert down_proj + shared_expert down_proj
#     + Layer-0 复制时需零化 mlp.down_proj.weight（dense 层）
#     参数增量较小（~6.5%），适合预算极有限的场景
