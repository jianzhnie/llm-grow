# ============================================================
# LongCat-Flash-Chat  →  ~2x 参数量
# 方法：Expert Upcycling（专家数扩增）
# 结果：512 experts → 1024 experts（256+256 zero → 512+512 zero），topk 12→24
#
# 架构特点（LongCat 自定义架构）：
#   - 28 层，每层包含：
#       双路 MLA 注意力：self_attn.0 / self_attn.1
#       512 路由专家 + 256 为零专家（zero_expert_type=identity）
#       2 个密集 MLP：mlps.0 / mlps.1（与 MoE 并列）
#       Router：mlp.router.classifier.weight + e_score_correction_bias
#   - 参数约 ~0.5T（256 真实专家 × 28 层 × ~38M/expert）
#   - 75 个分片
#
# 扩增策略：
#   512→1024 experts（256 真实→512 真实，256 zero→512 zero）
#   topk 12→24 保持相同激活比例
#   Router classifier.weight [512, hidden] → [1024, hidden]（行翻倍 + 噪声）
#   e_score_correction_bias [512] → [1024]（行翻倍）
#
# identity block 细节（LongCat 特有双路结构）：
#   双路注意力：self_attn.0.o_proj.weight + self_attn.1.o_proj.weight
#   双路 Dense MLP：mlps.0.down_proj.weight + mlps.1.down_proj.weight
#   所有专家：mlp.experts.{0..511}.down_proj.weight（512 个）
#   → LongcatDepthExpander 自动处理（514 个 zero-out tensors per identity layer）
# ============================================================

model:
  src_dir: /Users/robin/hfhub/models/meituan-longcat/LongCat-Flash-Chat
  family: longcat
  architecture: LongcatFlashForCausalLM
  original_layers: 28
  original_n_routed_experts: 512  # 256 真实 + 256 zero
  original_zero_expert_num: 256
  original_moe_topk: 12
  note: "权重文件需单独下载（目录当前仅含 index 和配置文件）"

expansion:
  method: expert
  algorithm: longcat_expert_upcycling   # 使用 LongcatExpertUpcyclingExpander

  # 专家扩增参数
  expand_factor: 2                # 512 → 1024 experts
  noise_scale: 1.0e-6             # Router classifier 新增行噪声系数

  # LongCat 专用扩增（与官方 expand_experts.py 等效，但使用 mmap 流式）
  double_zero_experts: true       # zero_expert_num 256 → 512

  # 同步更新配置
  config_patches:
    n_routed_experts: 1024        # 512 × 2
    zero_expert_num: 512          # 256 × 2
    moe_topk: 24                  # 12 × 2（保持相同激活比例）

  # 参数量预估
  note: "专家参数约占 ~95%，2x 专家 ≈ 2x 总参数量"

output:
  dir: ./outputs/longcat_flash_2x
  target_shard_gb: 2.0            # 每 shard ≤ 2GB（建议较小分片以便分布式加载）
  # 原 75 分片 → 预计 ~150 分片（每分片含专家权重翻倍）

# ── Continued Pre-training ────────────────────────────────────────────────
training:
  freeze_original: false

  phase1:
    description: "全参数 CPT，区分新旧专家（包括零专家的激活学习）"
    max_tokens: 40_000_000_000    # 40B tokens
    learning_rate: 2.0e-5
    lr_scheduler: cosine
    warmup_steps: 2000
    per_device_batch_size: 1
    gradient_accumulation_steps: 16
    save_steps: 1000

    # LongCat MoE 负载均衡
    moe_loss:
      load_balance_coeff: 1.0e-2
      z_loss_coeff: 1.0e-3

    # LongCat 特有：零专家激活监控
    # zero_expert 在训练中应逐渐获得非零权重以扩大容量

  # 需使用 LongCat 自定义 modeling_longcat_flash.py
  custom_modeling: modeling_longcat_flash.py
  custom_config: configuration_longcat_flash.py

data:
  pretrain_data_path: null
  pretrain_ratio: 0.92
  instruction_ratio: 0.05
  replay_ratio: 0.03
  sequence_length: 8192           # LongCat 支持长上下文，适当增加序列长度

eval:
  benchmarks: [mmlu, cmmlu, gsm8k, humaneval, longbench, needle_in_haystack]
  eval_every_n_tokens: 8_000_000_000
  monitor:
    expert_load_balance: true
    zero_expert_activation_rate: true  # 监控零专家是否开始真正激活

# ── 可选：深度扩增方案 ────────────────────────────────────────────────────
# expansion_alternative:
#   method: depth
#   algorithm: longcat_depth
#   num_new_layers: 4             # 28 + 4 = 32 层
#   note: |
#     每个 identity 层需零化（514 个张量）：
#       self_attn.0.o_proj + self_attn.1.o_proj (2)
#       mlps.0.down_proj + mlps.1.down_proj (2)
#       mlp.experts.{0..511}.down_proj (512)
#     参数增量较小（~14%）
