# Qwen3-30B-A3B  →  ~59B  |  Expert Upcycling（专家数扩增）
# 128 experts → 256 experts，~30B → ~59B，~2.0x
# 专家参数占 96%，expand_factor=2 精确对应 2x 总参数

model:
  src_dir: /Users/robin/hfhub/models/Qwen/Qwen3-30B-A3B
  family: standard_moe
  architecture: Qwen3MoeForCausalLM
  params: ~30B
  layers: 48
  experts_per_layer: 128
  topk: 8

expansion:
  method: expert
  algorithm: expert_clone
  expand_factor: 2                # 128 → 256 experts/层
  noise_scale: 1.0e-6             # router.weight 新增行的对称性破坏噪声
  config_patches:
    num_experts: 256
    num_experts_per_tok: 16       # 同步翻倍（激活参数 2x）
    # 若保持推理成本不变，改为 num_experts_per_tok: 8
  target_params: ~59B
  target_ratio: ~2.0x

output:
  dir: ./outputs/Qwen3-30B-A3B/expert_clone
  target_shard_gb: 4.0
