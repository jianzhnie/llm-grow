# Qwen3-8B  →  ~16.5B  |  MSG 深度+宽度混合扩增
# 36→46 层 + hidden 4096→4608 + intermediate 12288→15360，~8.2B → ~16.5B，~2.01x
# FP: ✓  推理延迟约 1.4x（优于纯深度翻倍的 2x）

model:
  src_dir: Qwen/Qwen3-8B
  family: dense
  architecture: Qwen3ForCausalLM
  params: ~8.2B
  layers: 36

expansion:
  method: width
  algorithm: msg
  num_new_layers: 10              # 36 + 10 = 46 层（+28%）
  insert_strategy: uniform
  hidden_size_expansion: 512      # 4096 → 4608（+12.5%，需整除 head_dim=128）
  intermediate_size_expansion: 3072  # 12288 → 15360（+25%）
  target_params: ~16.5B
  target_ratio: ~2.01x
  function_preserving: true
  note: "三维组合：1.28×1.25×1.25 ≈ 2x，延迟优于纯深度翻倍"

output:
  dir: ./outputs/Qwen3-8B/msg
  target_shard_gb: 4.0
