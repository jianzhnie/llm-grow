model_name_or_path: Qwen/Qwen3-8B
output_dir: ./outputs/qwen3_8b_msg_2x

expansion:
  method: msg
  # 组合扩增约 2x 参数量（深度 × 宽度 × FFN）
  depth_expansion: 10          # 36 → 46 层，贡献 ~28% 参数增量
  hidden_size_expansion: 512   # 4096 → 4608，贡献 ~27% 参数增量
  intermediate_size_expansion: 3072  # 12288 → 15360，贡献 ~25% 参数增量
  num_heads_expansion: 0       # 保持 GQA 结构不变
  freeze_original: true

growth_schedule:
  strategy: linear             # linear | cosine | step
  warmup_ratio: 0.3            # 前 30% 步数保持原始参数空间
  total_steps: 50000

verify_fp: true

training:
  max_tokens: 40_000_000_000   # 40B tokens（MSG 恢复较慢，需更多数据）
  learning_rate: 2.0e-5
  warmup_steps: 2000
  lr_scheduler: cosine
  per_device_batch_size: 2
  gradient_accumulation_steps: 8

data:
  pretrain_data_path: null
  domain_data_path: null
  instruction_data_ratio: 0.08

eval:
  benchmarks: [mmlu, gsm8k, humaneval, arc_challenge, ceval]
  eval_every_n_tokens: 5_000_000_000
