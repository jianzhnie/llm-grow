# Kimi-K2-Base  →  ~2T  |  Expert Upcycling（专家数扩增）
# 384 experts → 768 experts，~1T → ~2T，~2.0x
# FP8 量化：weight_scale_inv 随 weight 同步复制

model:
  src_dir: /Users/robin/hfhub/models/moonshotai/Kimi-K2-Base
  family: deepseek_moe
  architecture: DeepseekV3ForCausalLM
  params: ~1T
  layers: 61                      # layer 0 为 Dense，layer 1-60 为 MoE
  experts_per_moe_layer: 384      # 路由专家（layer 1-60）
  shared_experts: 1               # 共享专家（每 MoE 层常激活）
  topk: 8
  has_fp8: true
  has_mla_attn: true
  dense_only_layers: [0]

expansion:
  method: expert
  algorithm: generic_moe_upcycling
  expand_factor: 2                # 384 → 768 路由专家
  noise_scale: 1.0e-6
  config_patches:
    n_routed_experts: 768
    num_experts_per_tok: 16
    # n_shared_experts 保持不变（=1）
  target_params: ~2T
  target_ratio: ~2.0x
  fp8_note: "weight_scale_inv 随对应 weight 同步复制；训练需 fp8 感知框架"

output:
  dir: ./outputs/Kimi-K2-Base/expert_upcycling
  target_shard_gb: 2.0            # 建议较小分片（单层专家约 1.3GB）
