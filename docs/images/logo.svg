<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <!-- Core gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="50%" stop-color="#302B63"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="leaf3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA726"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="50%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softShadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="nodeGlow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#4A4A8A" stroke-width="2.5" opacity="0.5"/>

  <!-- Subtle star particles -->
  <circle cx="80" cy="100" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="85" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="130" cy="180" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="200" r="1.1" fill="#fff" opacity="0.35"/>
  <circle cx="90" cy="300" r="0.9" fill="#fff" opacity="0.25"/>
  <circle cx="440" cy="320" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="150" cy="80" r="1.3" fill="#fff" opacity="0.4"/>
  <circle cx="370" cy="130" r="0.7" fill="#fff" opacity="0.35"/>

  <!-- Root / Ground line -->
  <ellipse cx="256" cy="405" rx="110" ry="12" fill="#3E2723" opacity="0.5"/>

  <!-- Circuit traces from roots -->
  <g stroke="url(#circuit)" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M220,405 L200,430 L180,430"/>
    <path d="M240,408 L230,440 L210,440"/>
    <path d="M272,408 L282,440 L302,440"/>
    <path d="M292,405 L312,430 L332,430"/>
    <!-- Small nodes on circuit -->
    <circle cx="180" cy="430" r="3" fill="#00E5FF" opacity="0.6"/>
    <circle cx="210" cy="440" r="2.5" fill="#00E5FF" opacity="0.5"/>
    <circle cx="302" cy="440" r="2.5" fill="#00E5FF" opacity="0.5"/>
    <circle cx="332" cy="430" r="3" fill="#00E5FF" opacity="0.6"/>
  </g>

  <!-- Tree trunk -->
  <g filter="url(#softShadow)">
    <path d="M244,405 Q240,360 238,310 Q236,280 240,250 L256,200 L272,250 Q276,280 274,310 Q272,360 268,405 Z" fill="url(#trunk)"/>
    <!-- Bark texture lines -->
    <path d="M250,380 Q254,350 252,320" stroke="#4E342E" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M260,390 Q258,355 262,325" stroke="#4E342E" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Branches (subtle) -->
  <g stroke="#8D6E63" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M248,280 Q220,260 190,250"/>
    <path d="M264,280 Q292,260 322,250"/>
    <path d="M250,240 Q225,215 200,200"/>
    <path d="M262,240 Q287,215 312,200"/>
    <path d="M254,210 Q240,185 220,170"/>
    <path d="M258,210 Q272,185 292,170"/>
    <path d="M256,200 Q256,170 256,145"/>
  </g>

  <!-- Canopy - layered leaves (bottom to top = bigger to smaller model) -->
  <!-- Bottom layer (largest, darkest) -->
  <g filter="url(#softShadow)" opacity="0.9">
    <ellipse cx="195" cy="255" rx="45" ry="30" fill="url(#leaf3)"/>
    <ellipse cx="317" cy="255" rx="45" ry="30" fill="url(#leaf3)"/>
  </g>
  <!-- Middle layer -->
  <g filter="url(#softShadow)" opacity="0.92">
    <ellipse cx="205" cy="210" rx="50" ry="33" fill="url(#leaf2)"/>
    <ellipse cx="307" cy="210" rx="50" ry="33" fill="url(#leaf2)"/>
    <ellipse cx="256" cy="230" rx="42" ry="28" fill="url(#leaf2)"/>
  </g>
  <!-- Top layer (brightest, "grown") -->
  <g filter="url(#softShadow)" opacity="0.95">
    <ellipse cx="225" cy="175" rx="42" ry="28" fill="url(#leaf1)"/>
    <ellipse cx="287" cy="175" rx="42" ry="28" fill="url(#leaf1)"/>
    <ellipse cx="256" cy="155" rx="48" ry="32" fill="url(#leaf1)"/>
  </g>

  <!-- Neural network nodes on the tree (glowing) -->
  <g filter="url(#nodeGlow)">
    <!-- Layer 1 nodes (bottom) -->
    <circle cx="195" cy="260" r="6" fill="url(#glow2)"/>
    <circle cx="256" cy="270" r="6" fill="url(#glow2)"/>
    <circle cx="317" cy="260" r="6" fill="url(#glow2)"/>
    <!-- Layer 2 nodes (mid) -->
    <circle cx="205" cy="210" r="7" fill="url(#glow1)"/>
    <circle cx="256" cy="220" r="7" fill="url(#glow1)"/>
    <circle cx="307" cy="210" r="7" fill="url(#glow1)"/>
    <!-- Layer 3 nodes (top - new growth!) -->
    <circle cx="225" cy="170" r="8" fill="url(#glow3)"/>
    <circle cx="256" cy="150" r="9" fill="url(#glow3)"/>
    <circle cx="287" cy="170" r="8" fill="url(#glow3)"/>
  </g>

  <!-- Connections between nodes (neural net edges) -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.25">
    <!-- Layer 1 → 2 -->
    <line x1="195" y1="260" x2="205" y2="210"/>
    <line x1="195" y1="260" x2="256" y2="220"/>
    <line x1="256" y1="270" x2="205" y2="210"/>
    <line x1="256" y1="270" x2="256" y2="220"/>
    <line x1="256" y1="270" x2="307" y2="210"/>
    <line x1="317" y1="260" x2="256" y2="220"/>
    <line x1="317" y1="260" x2="307" y2="210"/>
    <!-- Layer 2 → 3 -->
    <line x1="205" y1="210" x2="225" y2="170"/>
    <line x1="205" y1="210" x2="256" y2="150"/>
    <line x1="256" y1="220" x2="225" y2="170"/>
    <line x1="256" y1="220" x2="256" y2="150"/>
    <line x1="256" y1="220" x2="287" y2="170"/>
    <line x1="307" y1="210" x2="256" y2="150"/>
    <line x1="307" y1="210" x2="287" y2="170"/>
  </g>

  <!-- Growth arrows (upward, expanding) -->
  <g filter="url(#glow)" opacity="0.7">
    <path d="M256,130 L256,110 M250,118 L256,108 L262,118" stroke="#AB47BC" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M215,155 L200,140 M208,148 L198,138 L210,140" stroke="#AB47BC" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M297,155 L312,140 M304,148 L314,138 L302,140" stroke="#AB47BC" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Chip/seed at the base of the tree -->
  <g transform="translate(236, 365)">
    <rect width="40" height="30" rx="5" fill="url(#chip)" filter="url(#nodeGlow)"/>
    <!-- Chip pins -->
    <rect x="-4" y="8"  width="6" height="3" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="-4" y="18" width="6" height="3" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="38" y="8"  width="6" height="3" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="38" y="18" width="6" height="3" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="10" y="-4" width="3" height="6" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="27" y="-4" width="3" height="6" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="10" y="28" width="3" height="6" rx="1" fill="#00E5FF" opacity="0.7"/>
    <rect x="27" y="28" width="3" height="6" rx="1" fill="#00E5FF" opacity="0.7"/>
    <!-- LLM text on chip -->
    <text x="20" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#E0F7FA" letter-spacing="1">LLM</text>
  </g>

  <!-- Title text -->
  <text x="256" y="462" text-anchor="middle" font-size="42" font-weight="800" fill="#E8E8F0" letter-spacing="3" filter="url(#softShadow)">LLM-GROW</text>
  <text x="256" y="486" text-anchor="middle" font-size="13" fill="#9E9EC8" letter-spacing="2" font-weight="400">GROW YOUR LLM FROM SEED</text>
</svg>
