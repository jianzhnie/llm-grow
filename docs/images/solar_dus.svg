<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="uG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5B9BD5"/><stop offset="100%" stop-color="#4080B0"/></linearGradient>
    <linearGradient id="lG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#70AD47"/><stop offset="100%" stop-color="#5A9A35"/></linearGradient>
    <linearGradient id="oG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BF8CD5"/><stop offset="100%" stop-color="#9B6BBF"/></linearGradient>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">SOLAR DUS: Depth Up-Scaling</text>
  <text x="430" y="54" text-anchor="middle" font-size="13" fill="#666">Layer overlap-copy (non function-preserving, requires CPT)</text>
  <!-- Original -->
  <text x="100" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#4080B0">Original (L=6, overlap=2)</text>
  <g filter="url(#sh)">
    <rect x="30" y="95"  width="140" height="36" rx="5" fill="url(#uG)"/><text x="100" y="118" text-anchor="middle" font-size="12" fill="#fff">Layer 0</text>
    <rect x="30" y="135" width="140" height="36" rx="5" fill="url(#uG)"/><text x="100" y="158" text-anchor="middle" font-size="12" fill="#fff">Layer 1</text>
    <rect x="30" y="175" width="140" height="36" rx="5" fill="url(#uG)"/><text x="100" y="198" text-anchor="middle" font-size="12" fill="#fff">Layer 2</text>
    <rect x="30" y="215" width="140" height="36" rx="5" fill="url(#uG)"/><text x="100" y="238" text-anchor="middle" font-size="12" fill="#fff">Layer 3</text>
    <rect x="30" y="255" width="140" height="36" rx="5" fill="url(#oG)"/><text x="100" y="278" text-anchor="middle" font-size="12" fill="#fff">Layer 4</text>
    <rect x="30" y="295" width="140" height="36" rx="5" fill="url(#oG)"/><text x="100" y="318" text-anchor="middle" font-size="12" fill="#fff">Layer 5</text>
  </g>
  <!-- Bracket upper -->
  <path d="M175,95 Q185,95 185,105 L185,222 Q185,231 195,231" fill="none" stroke="#4080B0" stroke-width="1.5"/>
  <text x="200" y="168" font-size="11" fill="#4080B0" font-weight="600">Upper [0:4]</text>
  <!-- Bracket overlap -->
  <path d="M175,255 Q185,255 185,265 L185,322 Q185,331 195,331" fill="none" stroke="#9B6BBF" stroke-width="1.5"/>
  <text x="200" y="296" font-size="11" fill="#9B6BBF" font-weight="600">Overlap zone</text>
  <!-- Arrow -->
  <line x1="250" y1="220" x2="340" y2="220" stroke="#888" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="338,214 354,220 338,226" fill="#555"/>
  <text x="297" y="210" text-anchor="middle" font-size="12" fill="#555" font-weight="600">split &amp; copy</text>
  <!-- Upper copy -->
  <text x="430" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#4080B0">Upper half</text>
  <g filter="url(#sh)">
    <rect x="360" y="95"  width="140" height="36" rx="5" fill="url(#uG)"/><text x="430" y="118" text-anchor="middle" font-size="12" fill="#fff">Layer 0'</text>
    <rect x="360" y="135" width="140" height="36" rx="5" fill="url(#uG)"/><text x="430" y="158" text-anchor="middle" font-size="12" fill="#fff">Layer 1'</text>
    <rect x="360" y="175" width="140" height="36" rx="5" fill="url(#uG)"/><text x="430" y="198" text-anchor="middle" font-size="12" fill="#fff">Layer 2'</text>
    <rect x="360" y="215" width="140" height="36" rx="5" fill="url(#uG)"/><text x="430" y="238" text-anchor="middle" font-size="12" fill="#fff">Layer 3'</text>
  </g>
  <!-- Lower copy -->
  <text x="430" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#5A9A35">Lower half</text>
  <g filter="url(#sh)">
    <rect x="360" y="285" width="140" height="36" rx="5" fill="url(#lG)"/><text x="430" y="308" text-anchor="middle" font-size="12" fill="#fff">Layer 2''</text>
    <rect x="360" y="325" width="140" height="36" rx="5" fill="url(#lG)"/><text x="430" y="348" text-anchor="middle" font-size="12" fill="#fff">Layer 3''</text>
    <rect x="360" y="365" width="140" height="36" rx="5" fill="url(#lG)"/><text x="430" y="388" text-anchor="middle" font-size="12" fill="#fff">Layer 4''</text>
  </g>
  <!-- Arrow 2 -->
  <line x1="510" y1="240" x2="590" y2="240" stroke="#888" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="588,234 604,240 588,246" fill="#555"/>
  <text x="555" y="230" text-anchor="middle" font-size="12" fill="#555" font-weight="600">concat</text>
  <!-- Result -->
  <text x="700" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Result: 2*(L-overlap)</text>
  <g filter="url(#sh)">
    <rect x="630" y="95"  width="140" height="30" rx="5" fill="url(#uG)"/><text x="700" y="115" text-anchor="middle" font-size="11" fill="#fff">Layer 0'</text>
    <rect x="630" y="129" width="140" height="30" rx="5" fill="url(#uG)"/><text x="700" y="149" text-anchor="middle" font-size="11" fill="#fff">Layer 1'</text>
    <rect x="630" y="163" width="140" height="30" rx="5" fill="url(#uG)"/><text x="700" y="183" text-anchor="middle" font-size="11" fill="#fff">Layer 2'</text>
    <rect x="630" y="197" width="140" height="30" rx="5" fill="url(#uG)"/><text x="700" y="217" text-anchor="middle" font-size="11" fill="#fff">Layer 3'</text>
    <rect x="630" y="237" width="140" height="30" rx="5" fill="url(#lG)"/><text x="700" y="257" text-anchor="middle" font-size="11" fill="#fff">Layer 2''</text>
    <rect x="630" y="271" width="140" height="30" rx="5" fill="url(#lG)"/><text x="700" y="291" text-anchor="middle" font-size="11" fill="#fff">Layer 3''</text>
    <rect x="630" y="305" width="140" height="30" rx="5" fill="url(#lG)"/><text x="700" y="325" text-anchor="middle" font-size="11" fill="#fff">Layer 4''</text>
    <rect x="630" y="350" width="140" height="28" rx="5" fill="#aaa"/>
    <text x="700" y="369" text-anchor="middle" font-size="11" fill="#fff">7 layers total</text>
  </g>
</svg>
